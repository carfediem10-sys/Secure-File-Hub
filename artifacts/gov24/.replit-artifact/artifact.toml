kind = "web"
previewPath = "/"
title = "정부24"
version = "1.0.0"
id = "artifacts/gov24"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25406

[services.development]
run = "pnpm --filter @workspace/gov24 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gov24", "run", "build" ]
publicDir = "artifacts/gov24/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25406"
BASE_PATH = "/"
